services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: uwork_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      BRASIL_API_BASE_URL: ${BRASIL_API_BASE_URL:-https://brasilapi.com.br/api}
      RECEITAWS_BASE_URL: ${RECEITAWS_BASE_URL:-https://receitaws.com.br/v1}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    expose:
      - "3000"
    networks:
      - uwork_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: uwork_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      cert-gen:
        condition: service_completed_successfully
    networks:
      - uwork_network

  cert-gen:
    image: alpine:3.20
    container_name: uwork_cert_gen
    volumes:
      - ./docker/nginx/ssl:/ssl
    command: >
      sh -c "
        apk add --no-cache openssl &&

        if [ ! -f /ssl/uwork.api.dev.crt ]; then
          echo 'Generating certificate for uwork.api.dev...' &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /ssl/uwork.api.dev.key \
            -out    /ssl/uwork.api.dev.crt \
            -subj   '/C=BR/ST=Sao Paulo/L=Sao Paulo/O=uWork/OU=API/CN=uwork.api.dev' \
            -addext 'subjectAltName=DNS:uwork.api.dev,IP:127.0.0.1' &&
          echo 'uwork.api.dev certificate generated.'
        else
          echo 'uwork.api.dev certificate already exists, skipping.'
        fi &&

        if [ ! -f /ssl/uwork.api.prod.crt ]; then
          echo 'Generating certificate for uwork.api.prod...' &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /ssl/uwork.api.prod.key \
            -out    /ssl/uwork.api.prod.crt \
            -subj   '/C=BR/ST=Sao Paulo/L=Sao Paulo/O=uWork/OU=API/CN=uwork.api.prod' \
            -addext 'subjectAltName=DNS:uwork.api.prod,IP:127.0.0.1' &&
          echo 'uwork.api.prod certificate generated.'
        else
          echo 'uwork.api.prod certificate already exists, skipping.'
        fi
      "
    networks:
      - uwork_network

networks:
  uwork_network:
    driver: bridge

volumes:
  nginx_logs:
    driver: local
